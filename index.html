<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopSphere Product Showcase</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <div class="logo-tagline">
            <img src="https://img.icons8.com/color/96/000000/shopping-cart.png" alt="ShopSphere Logo" class="logo animated-logo" />
            <div>
                <h1>ShopSphere</h1>
                <p class="tagline">Discover, Compare, Enjoy!</p>
            </div>
        </div>
        <form id="search-form">
            <input type="text" id="search-input" placeholder="Search products..." autocomplete="off" />
        </form>
    </header>

    <main id="product-container">
        <!-- Product cards will be injected here by script.js -->
    </main>

    <footer>
        <p>&copy; 2026 ShopSphere</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
